services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: genhealth
      POSTGRES_USER: genhealth
      POSTGRES_PASSWORD: genhealth_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genhealth"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
